services:
  db:
    image: pgvector/pgvector:pg16
    container_name: wealth-copilot-db
    environment:
      POSTGRES_USER: wealth
      POSTGRES_PASSWORD: wealth
      POSTGRES_DB: wealth_copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wealth -d wealth_copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
